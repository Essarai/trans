name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: code

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "pyinstaller>=6.10,<7"

      - name: Build EXE with PyInstaller
        run: pyinstaller --noconfirm --clean trans-converter.spec

      - name: Smoke test EXE startup
        shell: pwsh
        run: |
          $exe = "dist\trans-converter\trans-converter.exe"
          if (-not (Test-Path $exe)) {
            throw "EXE not found: $exe"
          }
          $proc = Start-Process -FilePath $exe -PassThru
          Start-Sleep -Seconds 6
          if ($proc.HasExited) {
            $log = Join-Path $env:LOCALAPPDATA "trans-converter-crash.log"
            if (Test-Path $log) {
              Write-Host "---- crash log ----"
              Get-Content $log
            }
            throw "EXE exited immediately with code $($proc.ExitCode)"
          }
          Stop-Process -Id $proc.Id -Force

      - name: Package release zip
        shell: pwsh
        run: |
          Compress-Archive -Path dist\trans-converter -DestinationPath dist\trans-converter-win64.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: windows-exe
          path: code/dist/trans-converter-win64.zip
